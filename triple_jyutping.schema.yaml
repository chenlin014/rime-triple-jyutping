schema:
  schema_id: triple_jyutping
  name: 粵語三拼
  version: "2026-04-26"
  author:
    - 陳林 <1chen0bryan@gmail.com>

switches:
  - name: ascii_mode
    reset: 0
    states: [ 粵, abc ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - lua_translator@*triple_jyutping*tran
  filters:
    - uniquifier

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcba;,./"
  initials: "zyxwvutsrqponmlkjihgfedcba"

translator:
  dictionary: jyut6ping3
  spelling_hints: 8

punctuator:
  import_preset: symbols_cantonese

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: period, send: period}
    - { when: has_menu, accept: comma, send: comma}

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
